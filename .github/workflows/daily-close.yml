name: Daily Kimp Close

on:
  schedule:
    # 매일 00:05 KST (= 15:05 UTC) 실행
    - cron: "5 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-close
  cancel-in-progress: false

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Append yesterday's close
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec tsx scripts/append-daily-close.ts

      - name: Commit & push
        run: |
          git config user.name "kyngwan"
          git config user.email "kyngwan@gmail.com"
          git add daily-close.txt
          if git diff --staged --quiet; then
            echo "No changes to commit (likely already recorded)"
            exit 0
          fi
          git commit -m "chore: daily close $(date -u -d 'yesterday' +%Y-%m-%d)"
          git push
